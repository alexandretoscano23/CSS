<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contato</title>
</head>
<body>
    <form action="">
        <fieldset><!-- cria uma borda em volta do formulário -->
            
         <!-- nome -->
          <div>
            <input type="text" name="name" id="name" placeholder="Digite o seu nome">
          </div>

          <!-- email -->
          <div>
            <input type="text" name="name" id="name" placeholder="Digite o seu email">
          </div>

          <!-- select-box -->
           <div>
            <select name="list" id="list">
                <option disabled selected>Qual sua idade?</option><!-- não seja possível selecionar que seja a que ja esta selecionada -->
                <option value="18+">18+</option>
                <option value="25+">25+</option>
                <option value="50+">50+</option>
            </select>
           </div>

           <!-- Qual a sua cidade? -->
           <h2 class="tittle">Qual cidade você reside?</h2>

           <div class="radio-class">
               <!-- João Pessoa -->
                <div>
                    <input type="radio" name="cidade" id="cidade" value="joão-pessoa"><span>João Pessoa</span><!-- é importante ter o mesmo nome e o id para que apenas uma radio seja selecionada. -->
                </div>
                <!-- Bananeiras -->
                <div>
                    <input type="radio" name="cidade" id="cidade" value="bananeiras"><span>Bananeiras</span>
                </div>
                <!-- Campina Grande -->
                <div>
                    <input type="radio" name="cidade" id="cidade" value="campina-grande"><span>Campina Grande</span>
                </div>
                <!-- solânea -->
                <div>
                    <input type="radio" name="cidade" id="cidade" value="solânea"><span>Solânea</span>
                </div>
           </div><!-- radio-class -->

           <!-- CheckBox -->
            <h2>Quais são seus Interesses?</h2>

            <div class="check-class">
                <!-- Mais experiência -->
                 <div>
                    <input type="checkbox" name="exper[]" id="exper[]" value="mais-experiência"><span>Mais experiência</span>
                 </div>
                 <!-- Me profissionalizar -->
                  <div>
                    <input type="checkbox" name="profis[]" id="profis[]" value="me-profissionalisar"><span>Me profissionalizar</span>
                  </div>
                  <!-- Apenas saber algo a mais -->
                   <div>
                    <input type="checkbox" name="apen[]" id="apen[]" value="apenas-algo-a-mais"><span>Apenas saber algo a mais </span>
                   </div>
            </div>

            <!-- área de texto -->
             <div>
                <textarea name="duvida" id="duvida" placeholder="alguma dúvida?"></textarea>
             </div>

            <!-- Botão -->
             <div>
                <button value="action">Enviar</button>
             </div>

            <legend>Entre em Contato</legend>
        </fieldset>
    </form>

    <br>

    <!-- Importar arquivo -->
    <form action="">
        <fieldset>
            <input type="file" name="file" id="file"><!-- selecionar arquivo -->

            <legend>Arquivo</legend>
        </fieldset>
    </form>

    <br>

    <!-- Personalizando select box -->
    <form action="">
        <fieldset>



            <legend>Personalizando</legend>
        </fieldset>
    </form>
</body>
</html>
